  - id: toss-payments
    category: payments
    priority: P1
    decision: build_direct
    official_docs:
      - https://docs.tosspayments.com/llms.txt
      - https://docs.tosspayments.com/reference
      - https://docs.tosspayments.com/guides/v2/get-started/environment
      - https://docs.tosspayments.com/reference/using-api/authorization
    auth:
      type:
        - api_key
      notes: "Secret key는 서버 전용이며 Basic base64(SECRET_KEY:) 방식으로 인증한다. 테스트/라이브 키를 분리한다."
    initial_surfaces:
      cli:
        - toss sales summary
        - toss settlements summary
        - toss payments detail
        - toss reconcile
      mcp:
        - toss_sales_summary
        - toss_transaction_list
        - toss_settlement_summary
        - toss_payment_detail
        - toss_reconcile
      skill:
        - toss-revenue-reconciliation
    api_scope:
      read:
        - "GET /v1/transactions"
        - "GET /v1/settlements"
        - "GET /v1/payments/{paymentKey}"
        - "GET /v1/payments/orders/{orderId}"
      deferred_write:
        - "POST /v1/payments/{paymentKey}/cancel"
        - "POST /v1/settlements"
    output_models:
      - payment_detail
      - transaction_record
      - settlement_record
      - sales_summary
      - settlement_reconciliation
    aggregation_focus:
      - "매출 집계: 승인/취소/부분취소를 기간, 결제수단, MID, 주문 기준으로 요약"
      - "정산 집계: 정산 조회 결과를 지급일/거래일/수수료/정산상태 기준으로 요약"
      - "결제상세 보강: paymentKey 또는 orderId로 Payment 객체를 재조회해 영수증, 세금, 카드/가상계좌/계좌이체 세부 정보를 연결"
    write_policy: read_first
    risk:
      pii: medium
      money_movement: true
      production_write: true
    notes: "초반에는 매출, 정산, 결제상세 조회 집계에 특화한다. 환불, 수동정산, 현금영수증 발행은 MVP에서 비활성화한다."

