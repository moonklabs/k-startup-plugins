version: 1
generated_at: "2026-07-03"
status: draft
purpose: "API wrapper 후보의 공식성, 권한 장벽, tool surface, MVP 우선순위를 빠르게 고르기 위한 작업 매트릭스"

decision_legend:
  build_direct: "공식 API를 직접 감싼다."
  use_official_mcp: "공식 MCP 또는 벤더 제공 AI/tooling 표면을 우선 사용한다."
  provider_wrapper: "직접 기관 API가 아니라 인증된 provider/ASP/API 사업자를 감싼다."
  recommend_only: "직접 래퍼보다 공식 UI, 유료 서비스, 파트너 경로를 추천한다."
  snapshot_import: "공식 UI/문서에서 사용자가 확보한 HTML/CSV/XLS/PDF/HWP/HWPX를 import/정규화한다. 자동 수집은 공식 허가 뒤에만 켠다."
  defer: "접근권, 문서, 라이선스, 고객 수요가 확인될 때까지 보류한다."

services:
  - id: posthog
    category: analytics
    priority: P0
    decision: build_direct
    official_docs:
      - https://posthog.com/docs/api
    auth:
      type:
        - project_token
        - personal_api_key
        - oauth2
      notes: "Public capture endpoint와 private query/admin endpoint 인증 모델을 분리한다."
    initial_surfaces:
      cli:
        - posthog query
        - posthog events list
        - posthog feature-flags list
      mcp:
        - posthog_query
        - posthog_event_definitions
        - posthog_feature_flags
      skill:
        - product-analytics-report
    write_policy: read_first
    risk:
      pii: medium
      money_movement: false
      production_write: false
    notes: "첫 end-to-end proof 1순위."

