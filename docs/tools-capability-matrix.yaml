  - id: korea-vc-fund-disclosure
    category: fundraising_data
    priority: P1
    decision: local_personal_data_mcp
    official_docs:
      - http://fundfinder.k-vic.co.kr/rsh/rsh/RshMacFnd
      - http://diva.kvca.or.kr/div/cmn/DivDisclsMainInq
    reference_implementations:
      - https://github.com/chrisryugj/schoolinfo-mcp
    auth:
      type:
        - manual_snapshot
        - local_watch_folder
        - user_browser_capture
        - official_permission_for_scheduled_fetch
      notes: "KVIC/KVCA 모두 live HTML 조회는 가능하지만 robots.txt가 전체 Disallow를 반환하므로 초기 제품은 사용자 제공 스냅샷, 로컬 watch folder, 사용자 제스처 기반 browser capture import로 제한한다."
    initial_surfaces:
      cli:
        - vc-funds setup
        - vc-funds init
        - vc-funds doctor
        - vc-funds import kvic
        - vc-funds import kvca
        - vc-funds import document
        - vc-funds import guide
        - vc-funds guide-source add
        - vc-funds guide-source check
        - vc-funds watch
        - vc-funds diff
        - vc-funds query investor
        - vc-funds events
        - vc-funds ask
        - vc-funds uninstall
      mcp:
        - configure_collection_source
        - list_collection_sources
        - run_personal_collection
        - import_browser_snapshot
        - import_kvic_snapshot
        - import_kvca_snapshot
        - import_disclosure_document
        - import_founder_guide_document
        - register_founder_guide_source
        - check_founder_guide_source
        - query_investor_profile
        - lookup_vc_fund_holdings
        - search_funds_for_startup
        - search_disclosure_evidence
        - search_founder_knowledge
        - explain_fundraising_concept
        - generate_fundraising_checklist
        - answer_founder_question
        - list_new_fund_events
        - list_unreviewed_fund_events
        - get_collection_health
      skill:
        - deal-sourcing
        - investor-research
    distribution:
      default:
        - homebrew_tap
        - github_releases_binary
      fallback:
        - source_checkout
      not_default:
        - npm_scoped_package
      notes: "npm scoped package는 비용/권한/registry 의존 문제가 있으므로 기본 설치 경로로 쓰지 않는다. MCP는 설치된 `vc-funds mcp serve`를 호출한다."
    write_policy: read_only
    risk:
      pii: medium
      money_movement: false
      production_write: false
    output_models:
      - fundfinder_parameter_catalog
      - vc_operator
      - investor_profile
      - fund_association
      - disclosure_document
      - founder_guide_source
      - founder_guide_document
      - founder_guide_chunk
      - fundraising_concept
      - guidance_card
      - fund_event
      - fund_evidence_pack
      - collection_run
    document_parsing:
      supported_inputs:
        - html
        - csv
        - xls
        - xlsx
        - pdf
        - hwpx
        - hwp_with_local_adapter
      rules:
        - "원본 파일 sha256, 출처 URL, import 시각을 저장한다."
        - "PDF/HWP/HWPX 첨부 공시는 원본, 추출 텍스트, 구조화 이벤트를 분리 저장한다."
        - "창업자 가이드 PDF/HWPX는 공시 evidence와 분리해 guide document, chunk, concept, guidance card로 저장한다."
        - "담당자 이메일, 전화번호, 휴대전화, 공시담당자 정보는 기본 응답에서 마스킹한다."
        - "HWP binary는 직접 포맷 추측 구현을 하지 않고 로컬 변환기, kordoc류 파서, 한컴 SDK adapter 뒤로 격리한다."
        - "watch folder와 browser capture는 외부 사이트 자동 접속 없이 사용자가 확보한 자료만 import한다."
        - "scheduled fetcher는 공식 허가, 제휴, 유료 데이터 계약이 확인된 source_config에서만 활성화한다."
        - "가이드 문서는 요약/체크리스트 중심으로 사용하고 원문 전체 재출력은 피한다."
    notes: "Seed/Pre-A 딜소싱에서 신규 펀드 결성, 모태출자 여부, 결성총액, 만기일, 투자분야를 공식 근거로 연결하는 별도 로컬 데이터조회 MCP 후보."

