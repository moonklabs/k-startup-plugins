version: 1
generated_at: "2026-07-04"
status: draft
purpose: "VC/AC 공시 evidence와 창업자 guide 자료를 최대한 수집해 로컬 DB로 정규화하기 위한 source registry"

policy_legend:
  allowed_local_import: "사용자가 확보한 로컬 파일, snapshot, browser capture를 import한다."
  requires_check: "자동화 전 robots/약관/공식 허가를 다시 확인한다."
  permission_required: "공식 허가, 제휴, 유료 계약이 있어야 scheduled fetch를 켠다."
  blocked_by_default: "기본값으로 비활성화한다."

sources:
  - source_id: kvic_fundfinder
    source_name: "KVIC FundFinder"
    owner: "한국벤처투자"
    source_type: official_web_table
    trust_tier: T1_user_captured_official_snapshot
    authoritative_scope:
      - investor_fund_holding
      - startup_fund_search
      - new_fund_event
    freshness_days: 180
    base_url: "http://fundfinder.k-vic.co.kr/rsh/rsh/RshMacFnd"
    known_endpoints:
      - "GET /rsh/rsh/RshMacFndInq"
      - "POST /rsh/rsh/RshMacFndLstInq"
    policy_status: permission_required
    default_collection_modes:
      - manual_snapshot_import
      - browser_capture_import
    disabled_collection_modes:
      - site_background_crawler
      - scheduled_fetch_without_permission
    robots_note: "2026-07-04 조사 기준 robots.txt 전체 Disallow로 기록. 자동 수집 전 재확인 필요."
    primary_keys:
      - source_snapshot_id
      - fund_name
      - operator_name
      - category_code
      - subcategory_code
    data_targets:
      - kvic_fundfinder_categories
      - funds
      - investors
      - fund_operator_links
      - fund_investment_focus
      - events
    required_fields:
      - fund_name
      - operator_name
      - category_code
      - subcategory_code
      - source_url
      - captured_at
      - content_sha256
    useful_fields:
      - formed_date
      - committed_amount_krw
      - invested_amount_krw
      - duration_text
      - location_text
      - operator_homepage
      - investment_purpose
    quality_checks:
      - category_code_present
      - category_catalog_match
      - amount_parse_confidence
      - operator_alias_resolution
